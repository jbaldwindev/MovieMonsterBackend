spring.application.name=demo-test
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/moviemonster_test}
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.generate-ddl=true
spring.jpa.show-sql=false
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5

jwt.secret=test-jwt-secret-for-ci
tmdb.key=test-tmdb-key

aws.s3.bucket=test-bucket
aws.s3.accessKey=test-access-key
aws.s3.secretKey=test-secret-key

app.cors.allowed-origins=http://localhost:3000
app.cors.allowed-origin-patterns=http://localhost:*
app.cookie.secure=false
app.cookie.same-site=Lax
app.cookie.domain=
