spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}

jwt.secret=${JWT_SECRET}
tmdb.key=${TMDB_KEY}

aws.s3.bucket=${S3_BUCKET_NAME}
aws.s3.accessKey=${S3_ACCESS_KEY}
aws.s3.secretKey=${S3_SECRET_KEY}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.generate-ddl=true
spring.datasource.hikari.connectionTimeout=20000
spring.datasource.hikari.maximumPoolSize=5
spring.application.name=demo
jwt.expiration=3600000
server.forward-headers-strategy=framework
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://www.moviemonster.xyz,https://moviemonster.xyz}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}
app.cookie.domain=${APP_COOKIE_DOMAIN:}
