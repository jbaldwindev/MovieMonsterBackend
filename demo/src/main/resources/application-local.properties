spring.datasource.url=${LOCAL_JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/MovieMonster}
spring.datasource.username=${LOCAL_JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${LOCAL_JDBC_DATABASE_PASSWORD:postgres}

jwt.secret=${LOCAL_JWT_SECRET:local-dev-jwt-secret-change-me}
tmdb.key=${LOCAL_TMDB_KEY:}

aws.s3.bucket=${LOCAL_S3_BUCKET_NAME:local-dev-bucket}
aws.s3.accessKey=${LOCAL_S3_ACCESS_KEY:local-access-key}
aws.s3.secretKey=${LOCAL_S3_SECRET_KEY:local-secret-key}

app.cors.allowed-origins=${LOCAL_APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
app.cookie.secure=${LOCAL_APP_COOKIE_SECURE:false}
app.cookie.same-site=${LOCAL_APP_COOKIE_SAME_SITE:Lax}
app.cookie.domain=${LOCAL_APP_COOKIE_DOMAIN:}
