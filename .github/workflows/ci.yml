name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            demo/target/surefire-reports
          if-no-files-found: warn

  package:
    name: Package Application
    runs-on: ubuntu-latest
    needs: unit-tests

    defaults:
      run:
        working-directory: demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Package application
        run: ./mvnw -DskipTests package

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: package
    env:
      IMAGE_REPOSITORY: moviemonster-backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker image tags
        id: docker-tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SHOULD_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          if [ "$SHOULD_PUSH" = "true" ]; then
            IMAGE="${DOCKERHUB_USERNAME}/${IMAGE_REPOSITORY}"
            {
              echo "tags<<EOF"
              echo "${IMAGE}:latest"
              echo "${IMAGE}:staging"
              echo "${IMAGE}:${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE_REPOSITORY}:ci" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: ${{ steps.docker-tags.outputs.tags }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: package
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: moviemonster_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moviemonster_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: demo

    env:
      TEST_DB_URL: jdbc:postgresql://localhost:5432/moviemonster_test
      TEST_DB_USERNAME: postgres
      TEST_DB_PASSWORD: postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Wait for PostgreSQL
        run: |
          until (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; do
            sleep 2
          done

      - name: Run integration tests
        run: ./mvnw -DskipTests package failsafe:integration-test failsafe:verify

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            demo/target/failsafe-reports
            demo/target/surefire-reports
          if-no-files-found: warn

  trigger-staging-deploy:
    name: Trigger Staging Deploy
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - integration-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger staging deploy
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
          INFRA_REPO: jbaldwin215/moviemonster-infra
        run: |
          curl --fail-with-body -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$INFRA_REPO/actions/workflows/deploy-staging.yml/dispatches" \
            -d '{"ref":"main","inputs":{"service":"backend","image_tag":"staging"}}'
