name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run unit tests
        run: ./mvnw test

  package:
    name: Package Application
    runs-on: ubuntu-latest
    needs: unit-tests

    defaults:
      run:
        working-directory: demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Package application
        run: ./mvnw -DskipTests package

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: package
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: moviemonster_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moviemonster_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: demo

    env:
      TEST_DB_URL: jdbc:postgresql://localhost:5432/moviemonster_test
      TEST_DB_USERNAME: postgres
      TEST_DB_PASSWORD: postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Wait for PostgreSQL
        run: |
          until (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; do
            sleep 2
          done

      - name: Run integration tests
        run: ./mvnw -DskipTests package failsafe:integration-test failsafe:verify
